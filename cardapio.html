<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardápio Digital - Cliente</title>
  <style>
    :root {
      --bg: #f5f5f6;
      --card: #ffffff;
      --text: #18181b;
      --muted: #71717a;
      --line: #e4e4e7;
      --red: #ea1d2c;
      --red2: #c91522;
      --green: #16a34a;
      --shadow: 0 18px 45px rgba(15,23,42,.10);
      --radius: 24px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      padding-bottom: 92px;
    }
    button, input, textarea, select { font-family: inherit; }
    .app { max-width: 1180px; margin: 0 auto; }
    .cover {
      height: 240px;
      border-bottom-left-radius: 36px;
      border-bottom-right-radius: 36px;
      background:
        linear-gradient(110deg, rgba(0,0,0,.72), rgba(0,0,0,.10)),
        radial-gradient(circle at 20% 20%, #ffd166, transparent 26%),
        linear-gradient(135deg, #111827, #4a0f14 55%, #ea1d2c);
      position: relative;
      overflow: hidden;
    }
    .cover:after {
      content: "🍔";
      position: absolute;
      right: 6%;
      bottom: -42px;
      font-size: 190px;
      transform: rotate(-10deg);
      filter: drop-shadow(0 25px 35px rgba(0,0,0,.28));
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 70px;
      padding: 0 22px;
      color: #fff;
      position: relative;
      z-index: 2;
    }
    .glass {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(14px);
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 13px;
    }
    .store {
      width: min(1040px, calc(100% - 28px));
      margin: -82px auto 16px;
      background: var(--card);
      border-radius: 30px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 16px;
      padding: 20px;
      position: relative;
      z-index: 4;
    }
    .logo {
      width: 90px;
      height: 90px;
      border-radius: 26px;
      background: linear-gradient(135deg, #ea1d2c, #111827);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 44px;
      box-shadow: 0 16px 35px rgba(234,29,44,.25);
    }
    h1 { margin: 2px 0 8px; font-size: clamp(26px, 5vw, 40px); letter-spacing: -1px; }
    .meta { display: flex; gap: 8px; flex-wrap: wrap; color: var(--muted); font-size: 14px; }
    .meta span { background: #f4f4f5; padding: 8px 10px; border-radius: 999px; font-weight: 800; }
    .open { color: #166534 !important; background: #dcfce7 !important; }
    .bar {
      width: min(1040px, calc(100% - 28px));
      margin: 0 auto 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 10px 0;
      background: rgba(245,245,246,.88);
      backdrop-filter: blur(16px);
    }
    .search {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 14px 16px;
      box-shadow: 0 8px 22px rgba(0,0,0,.04);
    }
    .search input { width: 100%; border: 0; outline: 0; background: transparent; font-size: 15px; }
    .cart-mini {
      border: 0;
      background: var(--red);
      color: #fff;
      border-radius: 18px;
      padding: 0 18px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(234,29,44,.25);
    }
    .categories {
      width: min(1040px, calc(100% - 28px));
      margin: 0 auto 20px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .cat {
      white-space: nowrap;
      border: 1px solid var(--line);
      background: var(--card);
      color: #3f3f46;
      border-radius: 999px;
      padding: 11px 15px;
      font-weight: 950;
      cursor: pointer;
    }
    .cat.active { background: #18181b; color: #fff; border-color: #18181b; }
    .content {
      width: min(1040px, calc(100% - 28px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 370px;
      gap: 22px;
      align-items: start;
    }
    .title { display: flex; align-items: end; justify-content: space-between; margin: 10px 0 14px; }
    .title h2 { margin: 0; font-size: 24px; letter-spacing: -.5px; }
    .title small { color: var(--muted); font-weight: 900; }
    .menu { display: grid; gap: 13px; }
    .item {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr 128px;
      gap: 14px;
      cursor: pointer;
      transition: .18s;
    }
    .item:hover { transform: translateY(-2px); box-shadow: 0 16px 35px rgba(15,23,42,.08); }
    .item h3 { margin: 0 0 8px; font-size: 18px; }
    .item p { margin: 0 0 12px; color: var(--muted); font-size: 14px; line-height: 1.4; }
    .price { font-weight: 950; font-size: 18px; }
    .thumb {
      min-height: 128px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      display: grid;
      place-items: center;
      font-size: 54px;
      color: #fff;
      background: linear-gradient(135deg, #ffb703, #ea1d2c 58%, #18181b);
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .thumb span { z-index: 1; }
    .add {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 0;
      background: var(--red);
      color: #fff;
      font-size: 24px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(234,29,44,.35);
      z-index: 2;
    }
    .cart {
      position: sticky;
      top: 88px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .cart header { padding: 18px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .cart h2 { margin: 0; font-size: 20px; }
    .cart-body { padding: 16px; max-height: 380px; overflow-y: auto; }
    .empty { color: var(--muted); text-align: center; padding: 32px 12px; }
    .cart-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .cart-row strong { display: block; margin-bottom: 4px; }
    .cart-row small { color: var(--muted); }
    .qty { display: flex; align-items: center; gap: 8px; }
    .qty button { width: 31px; height: 31px; border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--red); font-weight: 950; cursor: pointer; }
    .cart-footer { padding: 16px; border-top: 1px solid var(--line); background: #fafafa; }
    .total { display: flex; justify-content: space-between; font-weight: 950; margin-bottom: 12px; }
    .checkout { width: 100%; border: 0; background: var(--red); color: #fff; padding: 15px; border-radius: 16px; font-size: 16px; font-weight: 950; cursor: pointer; }
    .checkout:disabled { opacity: .45; cursor: not-allowed; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.50); z-index: 30; display: none; place-items: end center; padding: 18px; }
    .modal-bg.open { display: grid; }
    .modal { width: min(620px, 100%); max-height: 92vh; overflow: auto; background: #fff; border-radius: 30px; box-shadow: 0 35px 90px rgba(0,0,0,.28); }
    .modal-head { display: flex; justify-content: space-between; gap: 14px; padding: 20px 20px 0; }
    .modal h2 { margin: 0; }
    .close { border: 0; background: #f4f4f5; width: 42px; height: 42px; border-radius: 50%; font-size: 22px; cursor: pointer; }
    form { padding: 20px; display: grid; gap: 12px; }
    label { display: block; font-size: 13px; color: #52525b; font-weight: 950; margin-bottom: 6px; }
    input, textarea, select { width: 100%; border: 1px solid var(--line); border-radius: 15px; padding: 13px; outline: 0; font-size: 15px; background: #fff; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .preview { background: #f4f4f5; border: 1px solid var(--line); padding: 14px; border-radius: 16px; line-height: 1.5; }
    .mobile-cart { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 20; display: none; justify-content: space-between; border: 0; background: var(--red); color: #fff; border-radius: 20px; padding: 16px; font-size: 16px; font-weight: 950; box-shadow: 0 20px 50px rgba(234,29,44,.32); }
    @media(max-width:930px) {
      .content { grid-template-columns: 1fr; }
      .cart { display: none; }
      .mobile-cart { display: flex; }
      .store { grid-template-columns: 74px 1fr; }
      .logo { width: 74px; height: 74px; font-size: 34px; border-radius: 22px; }
    }
    @media(max-width:560px) {
      .cover { height: 190px; }
      .cover:after { font-size: 145px; right: -22px; }
      .bar { grid-template-columns: 1fr; }
      .cart-mini { display: none; }
      .item { grid-template-columns: 1fr 100px; }
      .thumb { min-height: 106px; font-size: 42px; }
      .two { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="cover">
      <div class="topbar">
        <div class="glass">Aberto agora</div>
        <div class="glass">Entrega 35–50 min</div>
      </div>
    </section>

    <section class="store">
      <div class="logo">🍔</div>
      <div>
        <h1>Burger House</h1>
        <div class="meta">
          <span class="open">🟢 Aceitando pedidos</span>
          <span>⭐ 4.9</span>
          <span>Hambúrguer artesanal</span>
          <span>Pedido mínimo R$ 20</span>
        </div>
      </div>
    </section>

    <section class="bar">
      <div class="search">🔎 <input id="search" oninput="renderMenu()" placeholder="Buscar no cardápio..." /></div>
      <button class="cart-mini" onclick="openCheckout()">Ver pedido</button>
    </section>

    <section id="categories" class="categories"></section>

    <section class="content">
      <main>
        <div class="title">
          <h2>Cardápio</h2>
          <small id="countItems">0 itens</small>
        </div>
        <div id="menu" class="menu"></div>
      </main>

      <aside class="cart">
        <header>
          <h2>Seu pedido</h2>
          <strong id="cartCount">0</strong>
        </header>
        <div id="cartBody" class="cart-body"></div>
        <footer class="cart-footer">
          <div class="total"><span>Total</span><span id="cartTotal">R$ 0,00</span></div>
          <button id="checkoutBtn" class="checkout" onclick="openCheckout()" disabled>Finalizar pedido</button>
        </footer>
      </aside>
    </section>
  </div>

  <button id="mobileCart" class="mobile-cart" onclick="openCheckout()">
    <span>Ver pedido</span><span id="mobileTotal">R$ 0,00</span>
  </button>

  <section id="checkoutModal" class="modal-bg">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2>Finalizar pedido</h2>
          <p style="margin:6px 0 0;color:#71717a">Preencha os dados para enviar.</p>
        </div>
        <button class="close" onclick="closeCheckout()">×</button>
      </div>
      <form onsubmit="finishOrder(event)">
        <div class="two">
          <div><label>Nome</label><input name="customerName" required placeholder="Seu nome" /></div>
          <div><label>WhatsApp</label><input name="phone" required placeholder="(00) 00000-0000" /></div>
        </div>
        <div class="two">
          <div><label>Tipo</label><select name="deliveryType"><option>Entrega</option><option>Retirada</option></select></div>
          <div><label>Pagamento</label><select name="payment"><option>Pix</option><option>Cartão na entrega</option><option>Dinheiro</option></select></div>
        </div>
        <div><label>Endereço</label><input name="address" placeholder="Rua, número, bairro, referência" /></div>
        <div><label>Observação</label><textarea name="notes" rows="3" placeholder="Ex: sem cebola, troco..."></textarea></div>
        <div id="preview" class="preview"></div>
        <button class="checkout" type="submit">Enviar pedido</button>
      </form>
    </div>
  </section>

  <script>
    
const PRODUCTS_KEY = "burgerpro_products_v4";
const ORDERS_KEY = "burgerpro_orders_v4";

const defaultProducts = [
  {
    id: "p1",
    name: "Smash Classic",
    category: "Mais pedidos",
    description: "Pão brioche, 2 smash burgers, cheddar, picles e molho especial.",
    price: 29.90,
    emoji: "🍔",
    image: "",
    available: true
  },
  {
    id: "p2",
    name: "Bacon Crispy",
    category: "Mais pedidos",
    description: "Burger artesanal, cheddar cremoso, bacon crocante e barbecue.",
    price: 34.90,
    emoji: "🥓",
    image: "",
    available: true
  },
  {
    id: "p3",
    name: "Combo Casal",
    category: "Combos",
    description: "2 Smash Classic, 1 batata grande e 2 refrigerantes lata.",
    price: 72.90,
    emoji: "🔥",
    image: "",
    available: true
  },
  {
    id: "p4",
    name: "Batata Cheddar Bacon",
    category: "Porções",
    description: "Batata frita sequinha com cheddar cremoso e bacon em cubos.",
    price: 24.90,
    emoji: "🍟",
    image: "",
    available: true
  },
  {
    id: "p5",
    name: "Refrigerante Lata",
    category: "Bebidas",
    description: "Coca-Cola, Guaraná ou Fanta. Informe o sabor na observação.",
    price: 7.00,
    emoji: "🥤",
    image: "",
    available: true
  }
];

function money(value) {
  return Number(value || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

function getProducts() {
  const saved = localStorage.getItem(PRODUCTS_KEY);
  if (!saved) {
    localStorage.setItem(PRODUCTS_KEY, JSON.stringify(defaultProducts));
    return defaultProducts;
  }
  return JSON.parse(saved);
}

function saveProducts(products) {
  localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
}

function getOrders() {
  return JSON.parse(localStorage.getItem(ORDERS_KEY) || "[]");
}

function saveOrders(orders) {
  localStorage.setItem(ORDERS_KEY, JSON.stringify(orders));
}

function uid(prefix) {
  return `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2)}`;
}


    let selectedCategory = "Todos";
    let cart = JSON.parse(localStorage.getItem("burgerpro_cart_v4") || "[]");

    function saveCart() {
      localStorage.setItem("burgerpro_cart_v4", JSON.stringify(cart));
    }

    function cartTotal() {
      return cart.reduce((sum, item) => sum + item.price * item.qty, 0);
    }

    function cartQty() {
      return cart.reduce((sum, item) => sum + item.qty, 0);
    }

    function productImage(product) {
      if (product.image) return `<img src="${product.image}" alt="${product.name}">`;
      return `<span>${product.emoji || "🍔"}</span>`;
    }

    function renderCategories() {
      const products = getProducts().filter(p => p.available);
      const cats = ["Todos", ...new Set(products.map(p => p.category))];
      document.getElementById("categories").innerHTML = cats.map(cat => `
        <button class="cat ${selectedCategory === cat ? "active" : ""}" onclick="selectCategory('${cat}')">${cat}</button>
      `).join("");
    }

    function selectCategory(cat) {
      selectedCategory = cat;
      renderCategories();
      renderMenu();
    }

    function renderMenu() {
      const search = document.getElementById("search").value.toLowerCase().trim();
      let products = getProducts().filter(p => p.available);

      if (selectedCategory !== "Todos") products = products.filter(p => p.category === selectedCategory);
      if (search) {
        products = products.filter(p =>
          p.name.toLowerCase().includes(search) ||
          p.description.toLowerCase().includes(search) ||
          p.category.toLowerCase().includes(search)
        );
      }

      document.getElementById("countItems").textContent = `${products.length} itens`;
      document.getElementById("menu").innerHTML = products.length ? products.map(p => `
        <article class="item" onclick="addToCart('${p.id}')">
          <div>
            <h3>${p.name}</h3>
            <p>${p.description}</p>
            <div class="price">${money(p.price)}</div>
          </div>
          <div class="thumb">
            ${productImage(p)}
            <button class="add" onclick="event.stopPropagation(); addToCart('${p.id}')">+</button>
          </div>
        </article>
      `).join("") : `<div class="empty">Nenhum item encontrado.</div>`;
    }

    function addToCart(id) {
      const product = getProducts().find(p => p.id === id);
      if (!product) return;

      const found = cart.find(i => i.id === id);
      if (found) found.qty++;
      else cart.push({ id: product.id, name: product.name, price: product.price, qty: 1 });

      saveCart();
      renderCart();
    }

    function changeQty(id, delta) {
      const item = cart.find(i => i.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
      saveCart();
      renderCart();
    }

    function renderCart() {
      const count = cartQty();
      const total = cartTotal();

      document.getElementById("cartCount").textContent = count;
      document.getElementById("cartTotal").textContent = money(total);
      document.getElementById("mobileTotal").textContent = money(total);
      document.getElementById("checkoutBtn").disabled = count === 0;

      if (count === 0) {
        document.getElementById("cartBody").innerHTML = `<div class="empty">Seu pedido está vazio.</div>`;
        document.getElementById("mobileCart").style.display = "none";
        return;
      }

      document.getElementById("mobileCart").style.display = window.innerWidth <= 930 ? "flex" : "none";
      document.getElementById("cartBody").innerHTML = cart.map(item => `
        <div class="cart-row">
          <div><strong>${item.name}</strong><small>${money(item.price)} cada</small></div>
          <div class="qty">
            <button onclick="changeQty('${item.id}', -1)">−</button>
            <strong>${item.qty}</strong>
            <button onclick="changeQty('${item.id}', 1)">+</button>
          </div>
        </div>
      `).join("");
    }

    function openCheckout() {
      if (cart.length === 0) return alert("Adicione pelo menos um item ao pedido.");

      document.getElementById("preview").innerHTML = `
        <strong>Resumo do pedido:</strong><br>
        ${cart.map(i => `${i.qty}x ${i.name} — ${money(i.price * i.qty)}`).join("<br>")}
        <br><br><strong>Total: ${money(cartTotal())}</strong>
      `;
      document.getElementById("checkoutModal").classList.add("open");
    }

    function closeCheckout() {
      document.getElementById("checkoutModal").classList.remove("open");
    }

    function finishOrder(event) {
      event.preventDefault();

      const data = new FormData(event.target);
      const deliveryType = data.get("deliveryType");
      const address = data.get("address").trim();

      if (deliveryType === "Entrega" && !address) {
        alert("Informe o endereço para entrega.");
        return;
      }

      const orders = getOrders();
      const order = {
        id: uid("pedido"),
        number: orders.length + 1,
        createdAt: new Date().toISOString(),
        customerName: data.get("customerName"),
        phone: data.get("phone"),
        deliveryType,
        address,
        payment: data.get("payment"),
        notes: data.get("notes"),
        items: cart,
        total: cartTotal(),
        status: "Novo"
      };

      orders.unshift(order);
      saveOrders(orders);

      const whatsappNumber = "5531999999999"; // Troque pelo WhatsApp da hamburgueria.
      const msg = encodeURIComponent(
        `🍔 Novo pedido #${order.number}\n\n` +
        order.items.map(i => `${i.qty}x ${i.name} - ${money(i.price * i.qty)}`).join("\n") +
        `\n\nTotal: ${money(order.total)}` +
        `\nCliente: ${order.customerName}` +
        `\nWhatsApp: ${order.phone}` +
        `\nTipo: ${order.deliveryType}` +
        `\nEndereço: ${order.address || "Retirada"}` +
        `\nPagamento: ${order.payment}` +
        `\nObservação: ${order.notes || "Nenhuma"}`
      );

      cart = [];
      saveCart();
      renderCart();
      closeCheckout();
      event.target.reset();

      alert("Pedido enviado para a hamburgueria!");
      window.open(`https://wa.me/${whatsappNumber}?text=${msg}`, "_blank");
    }

    window.addEventListener("resize", renderCart);
    window.addEventListener("storage", () => {
      renderCategories();
      renderMenu();
    });

    document.addEventListener("DOMContentLoaded", () => {
      renderCategories();
      renderMenu();
      renderCart();
    });
  </script>
</body>
</html>
