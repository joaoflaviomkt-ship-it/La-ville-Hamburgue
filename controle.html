<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Ville Burgue - Controle Simples</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#fff7ed; --card:#fff; --text:#18181b; --muted:#71717a; --line:#e4e4e7;
      --red:#e11d2e; --green:#16a34a; --yellow:#fbbf24; --dark:#1c120f;
      --shadow:0 18px 45px rgba(15,23,42,.10); --radius:24px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0; min-height:100vh;
      background:radial-gradient(circle at 20% 10%,rgba(251,191,36,.23),transparent 28%),
                 radial-gradient(circle at 90% 90%,rgba(225,29,46,.15),transparent 30%),var(--bg);
      color:var(--text); font-family:Arial,Helvetica,sans-serif; padding:18px;
    }
    .app{width:min(980px,100%);margin:0 auto}
    header{display:flex;justify-content:space-between;align-items:center;gap:16px;margin:10px 0 18px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,var(--yellow),var(--red));display:grid;place-items:center;font-size:30px;box-shadow:0 14px 32px rgba(225,29,46,.22)}
    h1{margin:0;font-size:clamp(28px,5vw,42px);letter-spacing:-1px;color:var(--red)}
    p{color:var(--muted);line-height:1.45}
    .card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}
    label{display:block;font-size:13px;font-weight:900;color:#52525b;margin-bottom:7px}
    input,select{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;outline:0;background:#fff;font-size:15px}
    .btn{border:0;border-radius:16px;padding:14px 16px;font-weight:950;cursor:pointer;background:#f4f4f5;color:#18181b;font-size:15px}
    .btn.primary{background:var(--red);color:#fff}.btn.green{background:#dcfce7;color:#166534}.btn.red{background:#fee2e2;color:#991b1b}.btn.dark{background:var(--dark);color:#fff}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
    .stat{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px}.stat span{display:block;color:var(--muted);font-size:13px;font-weight:900}.stat strong{display:block;margin-top:7px;font-size:26px}
    .search-box{margin:16px 0;display:grid;grid-template-columns:1fr auto;gap:10px}.list{display:grid;gap:12px;margin-top:14px}
    .item{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
    .item h3{margin:0 0 7px;font-size:20px}.item p{margin:4px 0;color:var(--muted)}
    .badge{display:inline-flex;padding:7px 10px;border-radius:999px;font-weight:950;font-size:12px;margin-left:6px}
    .badge.pago{background:#dcfce7;color:#166534}.badge.pendente{background:#fee2e2;color:#991b1b}
    .actions{display:grid;gap:8px;min-width:150px}.empty{text-align:center;color:var(--muted);padding:28px}.small{font-size:12px;color:var(--muted);font-weight:800}
    @media(max-width:760px){body{padding:12px}header{align-items:flex-start;flex-direction:column}.grid,.stats,.item,.search-box{grid-template-columns:1fr}.actions{min-width:0}.top-actions{width:100%}.top-actions .btn{flex:1}}
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <div class="logo">🍔</div>
        <div>
          <h1>Controle Simples</h1>
          <p style="margin:4px 0 0">Anote quem pegou produto, se pagou ou ficou pendente.</p>
        </div>
      </div>
      <div class="top-actions">
        <a class="btn dark" href="index.html" style="text-decoration:none">Início</a>
        <a class="btn dark" href="dono.html" style="text-decoration:none">Dono</a>
      </div>
    </header>

    <section class="card">
      <form id="formRegistro" class="grid">
        <div><label>Nome da pessoa</label><input id="nome" required placeholder="Ex: João" autocomplete="off"></div>
        <div><label>Produto que pegou</label><input id="produto" required placeholder="Ex: Coca em lata" autocomplete="off"></div>
        <div><label>Valor, se quiser</label><input id="valor" type="number" step="0.01" placeholder="Ex: 7,00"></div>
        <div><label>Status</label><select id="status"><option value="pendente">Pendente</option><option value="pago">Pago</option></select></div>
        <div class="full"><button class="btn primary" style="width:100%" type="submit">Salvar registro</button></div>
      </form>
    </section>

    <section class="stats">
      <div class="stat"><span>Total de registros</span><strong id="statTotal">0</strong></div>
      <div class="stat"><span>Pendentes</span><strong id="statPendentes">0</strong></div>
      <div class="stat"><span>Pagos</span><strong id="statPagos">0</strong></div>
    </section>

    <section class="search-box">
      <input id="busca" placeholder="Pesquisar pelo nome da pessoa..." oninput="renderizar()">
      <button class="btn" onclick="limparBusca()">Limpar</button>
    </section>

    <section class="card">
      <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap">
        <div><h2 style="margin:0">Registros</h2><p style="margin:5px 0 0">Clique em “Marcar pago” quando a pessoa pagar.</p></div>
        <button class="btn" onclick="carregarRegistros()">Atualizar</button>
      </div>
      <div id="lista" class="list"></div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://ekydstwrxiezmawkodsm.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_hkOJW2Msy3guNTCfMI1Atg_2MrocwpB";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
    let registros = [];

    function money(v){return Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
    function esc(value){return String(value ?? "").replace(/[&<>"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]))}
    function dataBR(value){return value ? new Date(value).toLocaleString("pt-BR") : "-"}

    async function carregarRegistros(){
      const { data, error } = await supabaseClient.from("controle_simples").select("*").order("created_at", { ascending:false });
      if(error){
        console.error(error);
        lista.innerHTML = '<div class="empty">Erro ao carregar. Confira se a tabela controle_simples foi criada no Supabase.</div>';
        return;
      }
      registros = data || [];
      renderizar();
    }

    function renderizar(){
      const termo = (busca.value || "").trim().toLowerCase();
      const filtrados = registros.filter(r => String(r.nome || "").toLowerCase().includes(termo));
      statTotal.textContent = registros.length;
      statPendentes.textContent = registros.filter(r => r.status === "pendente").length;
      statPagos.textContent = registros.filter(r => r.status === "pago").length;

      lista.innerHTML = filtrados.length ? filtrados.map(r => `
        <article class="item">
          <div>
            <h3>${esc(r.nome)} <span class="badge ${r.status}">${r.status === "pago" ? "Pago" : "Pendente"}</span></h3>
            <p><strong>Produto:</strong> ${esc(r.produto)}</p>
            ${Number(r.valor || 0) > 0 ? `<p><strong>Valor:</strong> ${money(r.valor)}</p>` : ""}
            <p class="small">Criado em: ${dataBR(r.created_at)}</p>
          </div>
          <div class="actions">
            ${r.status === "pendente" ? `<button class="btn green" onclick="marcarPago('${r.id}')">Marcar pago</button>` : `<button class="btn red" onclick="marcarPendente('${r.id}')">Marcar pendente</button>`}
            <button class="btn red" onclick="excluirRegistro('${r.id}')">Excluir</button>
          </div>
        </article>
      `).join("") : '<div class="empty">Nenhum registro encontrado.</div>';
    }

    function limparBusca(){busca.value = ""; renderizar();}

    formRegistro.addEventListener("submit", async (event) => {
      event.preventDefault();
      const payload = {
        nome: nome.value.trim(),
        produto: produto.value.trim(),
        valor: valor.value ? Number(valor.value) : 0,
        status: status.value
      };
      const { error } = await supabaseClient.from("controle_simples").insert([payload]);
      if(error){
        console.error(error);
        alert("Erro ao salvar. Confira se a tabela controle_simples foi criada.");
        return;
      }
      event.target.reset();
      status.value = "pendente";
      await carregarRegistros();
      alert("Registro salvo.");
    });

    async function marcarPago(id){
      const { error } = await supabaseClient.from("controle_simples").update({ status:"pago", updated_at:new Date().toISOString() }).eq("id", id);
      if(error){console.error(error); alert("Erro ao marcar como pago."); return;}
      await carregarRegistros();
    }

    async function marcarPendente(id){
      const { error } = await supabaseClient.from("controle_simples").update({ status:"pendente", updated_at:new Date().toISOString() }).eq("id", id);
      if(error){console.error(error); alert("Erro ao marcar como pendente."); return;}
      await carregarRegistros();
    }

    async function excluirRegistro(id){
      if(!confirm("Excluir este registro?")) return;
      const { error } = await supabaseClient.from("controle_simples").delete().eq("id", id);
      if(error){console.error(error); alert("Erro ao excluir."); return;}
      await carregarRegistros();
    }

    carregarRegistros();
    setInterval(carregarRegistros, 15000);
  </script>
</body>
</html>
