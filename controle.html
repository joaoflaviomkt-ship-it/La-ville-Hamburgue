<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Ville Burgue - Controle Simples</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#fff7ed; --card:#fff; --text:#18181b; --muted:#71717a; --line:#e4e4e7;
      --red:#e11d2e; --green:#16a34a; --yellow:#fbbf24; --dark:#1c120f;
      --shadow:0 18px 45px rgba(15,23,42,.10); --radius:24px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0; min-height:100vh;
      background:radial-gradient(circle at 20% 10%,rgba(251,191,36,.23),transparent 28%),
                 radial-gradient(circle at 90% 90%,rgba(225,29,46,.15),transparent 30%),var(--bg);
      color:var(--text); font-family:Arial,Helvetica,sans-serif; padding:18px;
    }
    .app{width:min(980px,100%);margin:0 auto}
    header{display:flex;justify-content:space-between;align-items:center;gap:16px;margin:10px 0 18px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,var(--yellow),var(--red));display:grid;place-items:center;font-size:30px;box-shadow:0 14px 32px rgba(225,29,46,.22)}
    h1{margin:0;font-size:clamp(28px,5vw,42px);letter-spacing:-1px;color:var(--red)}
    p{color:var(--muted);line-height:1.45}
    .card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}
    label{display:block;font-size:13px;font-weight:900;color:#52525b;margin-bottom:7px}
    input,select{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;outline:0;background:#fff;font-size:15px}
    .btn{border:0;border-radius:16px;padding:14px 16px;font-weight:950;cursor:pointer;background:#f4f4f5;color:#18181b;font-size:15px;text-decoration:none;text-align:center}
    .btn.primary{background:var(--red);color:#fff}.btn.green{background:#dcfce7;color:#166534}.btn.red{background:#fee2e2;color:#991b1b}.btn.dark{background:var(--dark);color:#fff}.btn.yellow{background:#fef3c7;color:#92400e}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}
    .stat{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px}.stat span{display:block;color:var(--muted);font-size:13px;font-weight:900}.stat strong{display:block;margin-top:7px;font-size:26px}
    .search-box{margin:16px 0;display:grid;grid-template-columns:1fr auto;gap:10px}.list{display:grid;gap:12px;margin-top:14px}
    .person{background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;display:grid;gap:12px}
    .person-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .person h3{margin:0 0 7px;font-size:22px}.person p{margin:4px 0;color:var(--muted)}
    .badge{display:inline-flex;padding:7px 10px;border-radius:999px;font-weight:950;font-size:12px;margin-left:6px}
    .badge.pago{background:#dcfce7;color:#166534}.badge.pendente{background:#fee2e2;color:#991b1b}.badge.misto{background:#fef3c7;color:#92400e}
    .items{display:grid;gap:8px}
    .subitem{border:1px solid var(--line);border-radius:16px;padding:12px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:#fffaf4}
    .subitem strong{display:block;margin-bottom:3px}.subitem small{color:var(--muted);font-weight:800}
    .item-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .item-actions .btn{padding:10px 12px;font-size:13px;border-radius:12px}
    .empty{text-align:center;color:var(--muted);padding:28px}.small{font-size:12px;color:var(--muted);font-weight:800}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.48);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
    .modal-bg.open{display:flex}
    .modal{width:min(560px,100%);background:#fff;border-radius:26px;box-shadow:0 28px 70px rgba(0,0,0,.28);padding:18px}
    .modal-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    .modal h2{margin:0;color:var(--red)}
    .close{border:0;background:#f4f4f5;border-radius:14px;width:42px;height:42px;font-size:24px;font-weight:900;cursor:pointer}
    @media(max-width:760px){
      body{padding:12px}header{align-items:flex-start;flex-direction:column}.grid,.stats,.search-box{grid-template-columns:1fr}
      .person-head,.subitem{grid-template-columns:1fr}.item-actions{justify-content:stretch}.item-actions .btn,.top-actions .btn{flex:1}.top-actions{width:100%}
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <div class="logo">🍔</div>
        <div>
          <h1>Controle Simples</h1>
          <p style="margin:4px 0 0">Anote o que cada pessoa pegou e adicione novos itens no mesmo nome.</p>
        </div>
      </div>
      <div class="top-actions">
        <a class="btn dark" href="index.html">Início</a>
        <a class="btn dark" href="dono.html">Dono</a>
      </div>
    </header>

    <section class="card">
      <form id="formRegistro" class="grid">
        <div><label>Nome da pessoa</label><input id="nome" required placeholder="Ex: João" autocomplete="off"></div>
        <div><label>Produto que pegou</label><input id="produto" required placeholder="Ex: Coca em lata" autocomplete="off"></div>
        <div><label>Valor, se quiser</label><input id="valor" type="number" step="0.01" placeholder="Ex: 7,00"></div>
        <div><label>Status</label><select id="status"><option value="pendente">Pendente</option><option value="pago">Pago</option></select></div>
        <div class="full"><button id="btnSalvar" class="btn primary" style="width:100%" type="submit">Salvar novo nome / produto</button></div>
      </form>
    </section>

    <section class="stats">
      <div class="stat"><span>Pessoas</span><strong id="statPessoas">0</strong></div>
      <div class="stat"><span>Total de itens</span><strong id="statTotal">0</strong></div>
      <div class="stat"><span>Pendentes</span><strong id="statPendentes">0</strong></div>
      <div class="stat"><span>Total pendente</span><strong id="statValorPendente">R$ 0,00</strong></div>
    </section>

    <section class="search-box">
      <input id="busca" placeholder="Pesquisar pelo nome da pessoa..." oninput="renderizar()">
      <button class="btn" onclick="limparBusca()">Limpar</button>
    </section>

    <section class="card">
      <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap">
        <div>
          <h2 style="margin:0">Pessoas</h2>
          <p style="margin:5px 0 0">Clique em “Adicionar item” para colocar outro produto no mesmo nome.</p>
        </div>
        <button class="btn" onclick="carregarRegistros()">Atualizar</button>
      </div>
      <div id="lista" class="list"></div>
    </section>
  </main>

  <section id="modalAdicionar" class="modal-bg">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2>Adicionar item</h2>
          <p id="modalPessoaTexto" style="margin:5px 0 0">Adicionar novo produto.</p>
        </div>
        <button class="close" onclick="fecharModalAdicionar()">×</button>
      </div>

      <form id="formAdicionar" class="grid">
        <input type="hidden" id="addNome">
        <div class="full"><label>Produto</label><input id="addProduto" required placeholder="Ex: Água mineral" autocomplete="off"></div>
        <div><label>Valor, se quiser</label><input id="addValor" type="number" step="0.01" placeholder="Ex: 4,00"></div>
        <div><label>Status</label><select id="addStatus"><option value="pendente">Pendente</option><option value="pago">Pago</option></select></div>
        <div class="full"><button id="btnAddSalvar" class="btn primary" style="width:100%" type="submit">Adicionar nesse nome</button></div>
      </form>
    </div>
  </section>

  <script>
    const SUPABASE_URL = "https://ekydstwrxiezmawkodsm.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_hkOJW2Msy3guNTCfMI1Atg_2MrocwpB";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
    let registros = [];

    function money(v){return Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
    function esc(value){return String(value ?? "").replace(/[&<>"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]))}
    function dataBR(value){return value ? new Date(value).toLocaleString("pt-BR") : "-"}
    function erroMsg(error){return (error?.message || JSON.stringify(error) || "erro desconhecido")}
    function nomeChave(nome){return String(nome || "").trim().toLowerCase()}

    async function carregarRegistros(){
      const { data, error } = await supabaseClient.rpc("controle_simples_listar");
      if(error){
        console.error(error);
        lista.innerHTML = '<div class="empty">Erro ao carregar: '+esc(erroMsg(error))+'</div>';
        return;
      }
      registros = data || [];
      renderizar();
    }

    function agruparPorPessoa(listaRegistros){
      const mapa = new Map();

      listaRegistros.forEach(r => {
        const nomeLimpo = String(r.nome || "").trim() || "Sem nome";
        const key = nomeChave(nomeLimpo);

        if(!mapa.has(key)){
          mapa.set(key, {
            nome: nomeLimpo,
            itens: [],
            total: 0,
            pendente: 0,
            pago: 0,
            valorTotal: 0,
            valorPendente: 0,
            ultimo: r.created_at
          });
        }

        const pessoa = mapa.get(key);
        pessoa.itens.push(r);
        pessoa.total += 1;

        const valor = Number(r.valor || 0);
        pessoa.valorTotal += valor;

        if(r.status === "pago"){
          pessoa.pago += 1;
        } else {
          pessoa.pendente += 1;
          pessoa.valorPendente += valor;
        }

        if(new Date(r.created_at) > new Date(pessoa.ultimo)){
          pessoa.ultimo = r.created_at;
        }
      });

      return Array.from(mapa.values())
        .sort((a,b) => new Date(b.ultimo) - new Date(a.ultimo));
    }

    function statusPessoa(pessoa){
      if(pessoa.pendente === 0) return {classe:"pago", texto:"Tudo pago"};
      if(pessoa.pago === 0) return {classe:"pendente", texto:"Pendente"};
      return {classe:"misto", texto:"Parcial"};
    }

    function renderizar(){
      const termo = (busca.value || "").trim().toLowerCase();
      const grupos = agruparPorPessoa(registros);
      const filtrados = grupos.filter(p => p.nome.toLowerCase().includes(termo));

      statPessoas.textContent = grupos.length;
      statTotal.textContent = registros.length;
      statPendentes.textContent = registros.filter(r => r.status === "pendente").length;
      statValorPendente.textContent = money(registros.filter(r => r.status === "pendente").reduce((s,r)=>s+Number(r.valor||0),0));

      lista.innerHTML = filtrados.length ? filtrados.map(p => {
        const st = statusPessoa(p);
        const itensOrdenados = [...p.itens].sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

        return `
          <article class="person">
            <div class="person-head">
              <div>
                <h3>${esc(p.nome)} <span class="badge ${st.classe}">${st.texto}</span></h3>
                <p><strong>Itens:</strong> ${p.total} ${p.valorTotal > 0 ? ` • <strong>Total:</strong> ${money(p.valorTotal)}` : ""}</p>
                ${p.valorPendente > 0 ? `<p><strong>Pendente:</strong> ${money(p.valorPendente)}</p>` : ""}
              </div>
              <div class="item-actions">
                <button class="btn primary" onclick="abrirAdicionar('${esc(p.nome).replace(/'/g, "\\'")}')">Adicionar item</button>
                ${p.pendente > 0 ? `<button class="btn green" onclick="marcarTodosPessoa('${esc(p.nome).replace(/'/g, "\\'")}','pago')">Marcar tudo pago</button>` : `<button class="btn red" onclick="marcarTodosPessoa('${esc(p.nome).replace(/'/g, "\\'")}','pendente')">Marcar tudo pendente</button>`}
              </div>
            </div>

            <div class="items">
              ${itensOrdenados.map(r => `
                <div class="subitem">
                  <div>
                    <strong>${esc(r.produto)} <span class="badge ${r.status}">${r.status === "pago" ? "Pago" : "Pendente"}</span></strong>
                    <small>${Number(r.valor || 0) > 0 ? money(r.valor) + " • " : ""}${dataBR(r.created_at)}</small>
                  </div>
                  <div class="item-actions">
                    ${r.status === "pendente" ? `<button class="btn green" onclick="marcarStatus('${r.id}','pago')">Pago</button>` : `<button class="btn red" onclick="marcarStatus('${r.id}','pendente')">Pendente</button>`}
                    <button class="btn red" onclick="excluirRegistro('${r.id}')">Excluir</button>
                  </div>
                </div>
              `).join("")}
            </div>
          </article>
        `;
      }).join("") : '<div class="empty">Nenhum registro encontrado.</div>';
    }

    function limparBusca(){busca.value = ""; renderizar();}

    async function salvarRegistro(nomePessoa, produtoPessoa, valorPessoa, statusPessoaValor){
      const payload = {
        p_nome: nomePessoa.trim(),
        p_produto: produtoPessoa.trim(),
        p_valor: valorPessoa ? Number(valorPessoa) : 0,
        p_status: statusPessoaValor || "pendente"
      };

      return await supabaseClient.rpc("controle_simples_salvar", payload);
    }

    formRegistro.addEventListener("submit", async (event) => {
      event.preventDefault();
      btnSalvar.disabled = true;
      btnSalvar.textContent = "Salvando...";

      const { error } = await salvarRegistro(nome.value, produto.value, valor.value, status.value);

      btnSalvar.disabled = false;
      btnSalvar.textContent = "Salvar novo nome / produto";

      if(error){
        console.error(error);
        alert("Erro ao salvar: " + erroMsg(error));
        return;
      }

      event.target.reset();
      status.value = "pendente";
      await carregarRegistros();
      alert("Registro salvo.");
    });

    function abrirAdicionar(nomePessoa){
      addNome.value = nomePessoa;
      addProduto.value = "";
      addValor.value = "";
      addStatus.value = "pendente";
      modalPessoaTexto.textContent = "Adicionar novo produto para " + nomePessoa;
      modalAdicionar.classList.add("open");
      setTimeout(() => addProduto.focus(), 100);
    }

    function fecharModalAdicionar(){
      modalAdicionar.classList.remove("open");
    }

    formAdicionar.addEventListener("submit", async (event) => {
      event.preventDefault();

      btnAddSalvar.disabled = true;
      btnAddSalvar.textContent = "Adicionando...";

      const { error } = await salvarRegistro(addNome.value, addProduto.value, addValor.value, addStatus.value);

      btnAddSalvar.disabled = false;
      btnAddSalvar.textContent = "Adicionar nesse nome";

      if(error){
        console.error(error);
        alert("Erro ao adicionar: " + erroMsg(error));
        return;
      }

      fecharModalAdicionar();
      await carregarRegistros();
      alert("Item adicionado para " + addNome.value + ".");
    });

    async function marcarStatus(id, novoStatus){
      const { error } = await supabaseClient.rpc("controle_simples_marcar", { p_id:id, p_status:novoStatus });
      if(error){console.error(error); alert("Erro ao alterar status: " + erroMsg(error)); return;}
      await carregarRegistros();
    }

    async function marcarTodosPessoa(nomePessoa, novoStatus){
      const itens = registros.filter(r => nomeChave(r.nome) === nomeChave(nomePessoa));
      if(!itens.length) return;

      const texto = novoStatus === "pago" ? "marcar tudo como pago" : "marcar tudo como pendente";
      if(!confirm("Deseja " + texto + " para " + nomePessoa + "?")) return;

      for(const item of itens){
        const { error } = await supabaseClient.rpc("controle_simples_marcar", { p_id:item.id, p_status:novoStatus });
        if(error){
          console.error(error);
          alert("Erro ao alterar um dos itens: " + erroMsg(error));
          break;
        }
      }

      await carregarRegistros();
    }

    async function excluirRegistro(id){
      if(!confirm("Excluir este item?")) return;
      const { error } = await supabaseClient.rpc("controle_simples_excluir", { p_id:id });
      if(error){console.error(error); alert("Erro ao excluir: " + erroMsg(error)); return;}
      await carregarRegistros();
    }

    carregarRegistros();
    setInterval(carregarRegistros, 15000);
  </script>
</body>
</html>
