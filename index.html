<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Burger House - Links</title>

  <style>
    :root {
      --bg: #f8dfd3;
      --card: #fff4ec;
      --white: #ffffff;
      --red: #d71920;
      --red-dark: #b80f17;
      --yellow: #ffb703;
      --text: #d71920;
      --muted: #a63b24;
      --shadow: 0 20px 60px rgba(90, 20, 10, .22);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 255, 255, .42), transparent 24%),
        radial-gradient(circle at 90% 90%, rgba(215, 25, 32, .16), transparent 28%),
        var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--text);
    }

    .link-page {
      width: min(420px, 100%);
      min-height: 660px;
      background: rgba(255, 244, 236, .86);
      border: 2.5px solid var(--red);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 34px 26px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .link-page::before {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255, 183, 3, .14);
      top: -130px;
      right: -110px;
    }

    .link-page::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(215, 25, 32, .08);
      bottom: -110px;
      left: -90px;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    .logo-circle {
      width: 136px;
      height: 136px;
      margin: 26px auto 58px;
      border: 1.8px solid var(--red);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, .8), transparent 32%),
        rgba(255, 244, 236, .88);
      box-shadow: 0 12px 38px rgba(215, 25, 32, .10);
      position: relative;
    }

    .logo-circle::before {
      content: "🍔";
      position: absolute;
      top: -18px;
      right: -12px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--yellow);
      border: 2px solid var(--red);
      font-size: 24px;
      transform: rotate(10deg);
    }

    .logo-text {
      line-height: .83;
      color: var(--red);
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 900;
      letter-spacing: -1.5px;
      text-transform: lowercase;
    }

    .logo-text .top {
      font-size: 31px;
      display: block;
    }

    .logo-text .bottom {
      font-size: 34px;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      letter-spacing: .2px;
      font-weight: 900;
      color: var(--red);
    }

    .subtitle {
      margin: 16px 0 30px;
      font-size: 16px;
      color: var(--red);
      line-height: 1.45;
    }

    .buttons {
      display: grid;
      gap: 13px;
      margin-top: 14px;
    }

    .btn-link {
      min-height: 58px;
      border: 2px solid var(--red);
      border-radius: 999px;
      background: var(--white);
      color: var(--red);
      font-weight: 900;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      transition: .18s ease;
      padding: 0 18px;
      box-shadow: 0 10px 24px rgba(215, 25, 32, .05);
    }

    .btn-link:hover {
      transform: translateY(-2px);
      background: var(--red);
      color: #fff;
      box-shadow: 0 16px 32px rgba(215, 25, 32, .22);
    }

    .btn-link.primary {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .btn-link.primary:hover {
      background: var(--red-dark);
      border-color: var(--red-dark);
    }

    .footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(215, 25, 32, .25);
      background: rgba(255,255,255,.50);
      color: var(--red);
      font-size: 12px;
      font-weight: 900;
      margin-top: 18px;
    }

    .dot {
      width: 9px;
      height: 9px;
      background: #16a34a;
      border-radius: 50%;
      box-shadow: 0 0 0 5px rgba(22, 163, 74, .13);
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .link-page {
        min-height: calc(100vh - 20px);
        border-radius: 30px;
        padding: 28px 24px 20px;
      }

      .logo-circle {
        width: 128px;
        height: 128px;
        margin-top: 22px;
        margin-bottom: 54px;
      }

      h1 {
        font-size: 30px;
      }

      .subtitle {
        font-size: 15.5px;
      }

      .btn-link {
        min-height: 58px;
        font-size: 15.5px;
      }
    }

    @media (min-width: 700px) {
      .link-page {
        width: 420px;
      }
    }
  </style>
</head>

<body>
  <main class="link-page">
    <div class="content">
      <section class="logo-circle">
        <div class="logo-text">
          <span class="top">burger</span>
          <span class="bottom">house</span>
        </div>
      </section>

      <h1>Burger House</h1>

      <p class="subtitle">
        Hambúrguer artesanal feito com amor!
      </p>

      <section class="buttons">
        <a id="cardapioLink" class="btn-link primary" href="Cardapio.html">
          🍔 Ver cardápio
        </a>

        <a id="localizacaoLink" class="btn-link" href="#" target="_blank">
          📍 Localização
        </a>

        <a id="whatsappLink" class="btn-link" href="#" target="_blank">
          💬 WhatsApp para pedidos
        </a>

        <a id="ifoodLink" class="btn-link" href="#" target="_blank">
          🛵 Ifood
        </a>
      </section>

      <div class="status">
        <span class="dot"></span>
        Aberto para pedidos
      </div>

      <div class="footer">
        Entrega • Retirada • Pedidos online
      </div>
    </div>
  </main>

  <script>
    /*
      TROQUE AQUI OS DADOS DA HAMBURGUERIA
    */

    const CONFIG = {
      nome: "Burger House",

      // Arquivo do cardápio. Deixe na mesma pasta dessa landing page.
      linkCardapio: "Cardapio.html",

      // Número com DDI + DDD. Exemplo: 5531999999999
      whatsapp: "5531999999999",

      // Link do Google Maps ou endereço pesquisável
      linkLocalizacao: "https://www.google.com/maps/search/?api=1&query=Hamburgueria",

      // Link do iFood da hamburgueria
      linkIfood: "https://www.ifood.com.br/"
    };

    document.title = CONFIG.nome + " - Links";
    document.querySelector("h1").textContent = CONFIG.nome;

    const partesNome = CONFIG.nome.toLowerCase().split(" ");
    document.querySelector(".logo-text .top").textContent = partesNome[0] || "burger";
    document.querySelector(".logo-text .bottom").textContent = partesNome.slice(1).join(" ") || "house";

    document.getElementById("cardapioLink").href = CONFIG.linkCardapio;
    document.getElementById("localizacaoLink").href = CONFIG.linkLocalizacao;
    document.getElementById("ifoodLink").href = CONFIG.linkIfood;

    const mensagem = encodeURIComponent("Olá! Vim pela página da hamburgueria e gostaria de fazer um pedido.");
    document.getElementById("whatsappLink").href = `https://wa.me/${CONFIG.whatsapp}?text=${mensagem}`;
  </script>
</body>
</html>
